<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Expense Tracker</h1>

    <div class="balance-box">
      <h2>Balance: ₦<span id="balance">0</span></h2>
    </div>
<div id="converter-section" style="margin-top: 10px; text-align: center;">
    <p id="converted-amount" style="font-size: 0.9em; color: #666;">Convert to Initia: --</p>
    <button type="button" onclick="convertCurrency()" style="padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Convert ₦</button>
</div>

    <form id="transaction-form">
      <input type="text" id="desc" placeholder="Description" required>
      <input type="number" id="amount" placeholder="Amount" required>
      
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <button type="submit">Add</button>
    </form>

    <ul id="list"></ul>

    <div id="stats-section" class="stats-box">
       <h3>Smart Insights</h3>
       <p id="prediction-text">Add more transactions to see insights...</p>
    </div>
  </div> <script src="script.js"></script>
</body>
</html>
